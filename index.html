<!DOCTYPE html>
<html>

<head>
<title>Click Speed Game</title>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:100px;
background:#111;
color:white;
}

button{
padding:20px;
font-size:20px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Click Speed Game 🎮</h1>

<p>Time Left: <span id="time">10</span>s</p>
<p>Score: <span id="score">0</span></p>
<p>Last Click Speed: <span id="speed">0</span> ms</p>

<button onclick="clickGame()">CLICK ME</button>

<p id="result"></p>

<script>

let score = 0;
let timeLeft = 10;
let lastClick = 0;
let gameActive = true;

function clickGame(){

if(!gameActive) return;

let now = Date.now();

if(lastClick !== 0){
let response = now - lastClick;
document.getElementById("speed").innerText = response;
}

lastClick = now;

score++;
document.getElementById("score").innerText = score;

}

let timer = setInterval(function(){

timeLeft--;
document.getElementById("time").innerText = timeLeft;

if(timeLeft <= 0){

clearInterval(timer);
gameActive = false;

document.getElementById("result").innerText =
"Game Over! Your score: " + score;

}

},1000);

</script>

</body>

</html>
