<!DOCTYPE html>
<html>

<head>
<title>Click Game</title>

<style>
body {
font-family: Arial;
text-align: center;
margin-top: 100px;
background-color: #111;
color: white;
}

button {
padding: 20px;
font-size: 20px;
cursor: pointer;
}
</style>

</head>

<body>

<h1>Click Game 🎮</h1>

<p>Score: <span id="score">0</span></p>

<button onclick="increaseScore()">Click Me</button>

<script>

let score = 0;

function increaseScore() {
score = score + 1;
document.getElementById("score").innerText = score;
}

</script>

</body>
</html>
